version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: spider
    main: ./cmd/spider
    binary: spider
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: spider
    builds:
      - spider
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "spider_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: user
    name: spider
  prerelease: auto
